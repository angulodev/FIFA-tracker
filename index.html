<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B140E">
<title>FIFA Torneos</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<style>
:root{
  --bg:#0B140E;
  --surface:#122019;
  --surface2:#1A2C22;
  --line:#24382C;
  --volt:#C8F135;
  --volt-dim:#8FB324;
  --text:#EEF6EA;
  --muted:#8CA695;
  --danger:#F06565;
  --gold:#F5C542;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Archivo',system-ui,sans-serif;min-height:100%}
body{padding-bottom:env(safe-area-inset-bottom)}
#root{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
h1,h2,.display{font-family:'Anton',sans-serif;letter-spacing:.02em;text-transform:uppercase}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
::selection{background:var(--volt);color:var(--bg)}

/* Layout */
.screen{flex:1;padding:16px 16px 96px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px}
.topbar h1{font-size:26px;color:var(--volt)}
.topbar .sub{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  display:flex;background:rgba(11,20,14,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-radius:12px}
.nav button.active{color:var(--volt)}
.nav .ico{font-size:20px;line-height:1}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.card.tap{transition:transform .1s}
.card.tap:active{transform:scale(.985)}
.eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.section-title{font-family:'Anton';font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;
  border-radius:14px;font-weight:700;font-size:15px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--volt);color:#0B140E}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn.sm{padding:10px 14px;font-size:13px;width:auto;border-radius:10px}
.btn:disabled{opacity:.4;pointer-events:none}

/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.field input,.field select{width:100%;padding:13px 14px;background:var(--surface2);border:1px solid var(--line);
  border-radius:12px;color:var(--text);outline:none}
.field input:focus,.field select:focus{border-color:var(--volt)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 14px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);
  font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--volt);color:#0B140E;border-color:var(--volt)}

/* Scoreboard — elemento firma */
.scoreboard{background:linear-gradient(180deg,#0E1A13,#122019);border:1px solid var(--line);
  border-radius:18px;padding:18px 14px;position:relative;overflow:hidden}
.scoreboard::before{content:"";position:absolute;inset:0;background:
  repeating-linear-gradient(90deg,transparent 0 38px,rgba(200,241,53,.03) 38px 76px);pointer-events:none}
.sb-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.sb-team{text-align:center}
.sb-team .shield{font-size:34px}
.sb-team .name{font-size:12px;font-weight:700;margin-top:4px;line-height:1.2;word-break:break-word}
.sb-score{font-family:'Anton';font-size:52px;color:var(--volt);display:flex;align-items:center;gap:10px;
  text-shadow:0 0 24px rgba(200,241,53,.35)}
.sb-score .sep{color:var(--muted);font-size:30px}
.sb-vs{font-family:'Anton';font-size:22px;color:var(--muted)}
.sb-meta{text-align:center;font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.sb-pens{text-align:center;font-size:12px;color:var(--gold);margin-top:6px;font-weight:700}

/* Stepper del editor de marcador */
.stepper{display:flex;flex-direction:column;align-items:center;gap:6px}
.stepper .val{font-family:'Anton';font-size:64px;color:var(--volt);min-width:70px;text-align:center;
  text-shadow:0 0 28px rgba(200,241,53,.4)}
.stepper .ctrl{display:flex;gap:10px}
.stepper .ctrl button{width:52px;height:44px;border-radius:12px;background:var(--surface2);
  border:1px solid var(--line);font-size:22px;font-weight:700;color:var(--text)}
.stepper .ctrl button:active{background:var(--volt);color:#0B140E}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;
  display:flex;align-items:flex-end;justify-content:center}
.overlay.z2{z-index:60}
.overlay.center{align-items:center;padding:24px}
.dialog{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:20px;animation:fadeIn .15s ease}
.dialog .msg{font-size:14px;line-height:1.5;margin-bottom:18px}
.dialog .actions{display:flex;gap:10px}
.dialog .actions button{flex:1;padding:12px;border-radius:12px;font-weight:700;font-size:14px}
.dialog .actions .cancel{background:var(--surface2);border:1px solid var(--line);color:var(--text)}
.dialog .actions .ok{background:var(--volt);color:#0B140E}
.dialog .actions .ok.destructive{background:var(--danger);color:#fff}
.club-btn{width:100%;margin-top:6px;padding:8px 10px;background:var(--surface2);
  border:1px solid var(--line);border-radius:10px;font-size:12px;text-align:center}
.club-list button{display:flex;width:100%;align-items:center;justify-content:space-between;
  padding:13px 4px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;text-align:left}
.club-list button.sel{color:var(--volt)}
.sheet{width:100%;max-width:520px;background:var(--surface);border-radius:22px 22px 0 0;
  border:1px solid var(--line);border-bottom:none;padding:20px 18px calc(24px + env(safe-area-inset-bottom));
  max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.sheet h2{font-size:19px;margin-bottom:16px}
.sheet-grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}

/* Tabla de posiciones */
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  padding:8px 4px;text-align:center;border-bottom:1px solid var(--line)}
.table td{padding:10px 4px;text-align:center;border-bottom:1px solid var(--line)}
.table .tname{text-align:left;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:150px}
.table .tname .pos{margin-right:5px}
.table tr.q td:first-child{box-shadow:inset 3px 0 0 var(--volt)}
.table .pts{font-family:'Anton';font-size:15px;color:var(--volt)}
.pos{color:var(--muted);font-size:11px}
.pname{color:var(--muted);font-size:10px;font-weight:500}

/* Bracket */
.bracket{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;-webkit-overflow-scrolling:touch}
.b-round{min-width:210px;display:flex;flex-direction:column;justify-content:space-around;gap:12px}
.b-round-title{font-family:'Anton';font-size:12px;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;text-align:center;margin-bottom:2px}
.b-match{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.b-slot{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;font-weight:600}
.b-slot+.b-slot{border-top:1px solid var(--line)}
.b-slot .g{margin-left:auto;font-family:'Anton';font-size:16px;color:var(--muted)}
.b-slot.win{background:rgba(200,241,53,.08)}
.b-slot.win .g{color:var(--volt)}
.b-slot.tbd{color:var(--muted);font-style:italic;font-weight:400}
.b-pens{font-size:10px;color:var(--gold);padding:4px 12px 8px;text-align:right}

/* Match list rows */
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 12px;margin-bottom:10px}
.mrow .t{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;min-width:0}
.mrow .t span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow .t.right{justify-content:flex-end;text-align:right}
.mrow .mid{font-family:'Anton';font-size:19px;color:var(--volt);white-space:nowrap;padding:4px 10px;
  background:var(--surface2);border-radius:8px;border:1px solid var(--line)}
.mrow .mid.pend{color:var(--muted);font-size:13px;font-family:'Archivo';font-weight:700}
.mrow-tag{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px}

/* Stats dashboard */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
.stat .n{font-family:'Anton';font-size:30px;color:var(--volt)}
.stat .l{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

.champ-banner{background:linear-gradient(135deg,rgba(245,197,66,.15),rgba(200,241,53,.08));
  border:1px solid var(--gold);border-radius:16px;padding:16px;text-align:center;margin-bottom:12px}
.champ-banner .cup{font-size:36px}
.champ-banner .who{font-family:'Anton';font-size:22px;color:var(--gold);margin-top:4px}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:44px;margin-bottom:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase}
.badge.on{background:rgba(200,241,53,.15);color:var(--volt);border:1px solid var(--volt-dim)}
.badge.done{background:rgba(245,197,66,.12);color:var(--gold);border:1px solid rgba(245,197,66,.4)}
.row{display:flex;align-items:center;gap:10px}
.row .grow{flex:1;min-width:0}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.emoji-grid button{font-size:24px;padding:8px 0;border-radius:10px;background:var(--surface2);border:1px solid var(--line)}
.emoji-grid button.on{border-color:var(--volt);background:rgba(200,241,53,.12)}

/* Diálogos no nativos */
.overlay.center{align-items:center;padding:24px}
.dialog{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:20px;animation:fadeIn .15s ease}

/* Selector de club */
.club-btn{width:100%;margin-top:6px;padding:9px 10px;background:var(--surface2);
  border:1px solid var(--line);border-radius:10px;font-size:12px;color:var(--muted)}
.club-btn.set{color:var(--volt);border-color:var(--volt-dim);font-weight:700}
.club-list{max-height:42vh;overflow-y:auto;margin-bottom:8px}
.club-item{display:flex;align-items:center;width:100%;padding:13px 10px;
  border-bottom:1px solid var(--line);font-size:14px;font-weight:600;text-align:left}
.club-item.on{color:var(--volt)}
.club-item .chk{margin-left:auto;color:var(--volt)}
.hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45;
  padding:8px 10px;background:var(--surface);border-left:2px solid var(--volt-dim);border-radius:0 8px 8px 0}
.cbadge{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;
  border:1.5px solid;color:#fff;font-weight:800;vertical-align:-3px;flex:none;
  font-family:'Archivo';letter-spacing:-.02em;margin-right:4px}
.clogo{object-fit:contain;vertical-align:-4px;margin-right:4px;flex:none;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}

/* Ficha de club: gráficos CSS */
.gep{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--surface2);margin:8px 0 4px}
.gep .seg{height:100%}
.gep .seg.g{background:var(--volt)}
.gep .seg.e{background:#6B7F72}
.gep .seg.p{background:var(--danger)}
.gep-legend{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:.06em}
.spark{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:8px}
.spark .bar{flex:1;background:var(--volt);border-radius:3px 3px 0 0;min-height:3px;opacity:.9}
.spark .bar.zero{background:var(--surface2)}
.spark-labels{display:flex;gap:4px;margin-top:4px}
.spark-labels span{flex:1;text-align:center;font-size:8px;color:var(--muted)}
.big-stat-row{display:flex;gap:10px;margin:12px 0}
.big-stat{flex:1;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 4px}
.big-stat .n{font-family:'Anton';font-size:22px;color:var(--volt)}
.big-stat .l{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ach{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 6px;
  text-align:center}
.ach .ic{font-size:22px}
.ach .nm{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.2}
.streak-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;
  background:rgba(200,241,53,.12);border:1px solid var(--volt-dim);color:var(--volt);
  font-size:12px;font-weight:700}
.undo-toast{position:fixed;left:50%;bottom:76px;transform:translateX(-50%);width:calc(100% - 32px);
  max-width:488px;background:var(--surface2);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideUp .2s ease}
.undo-toast span{font-size:13px;color:var(--text)}
.undo-toast button{color:var(--volt);font-weight:700;font-size:13px;white-space:nowrap}

/* Ficha de club */
.back-btn{color:var(--volt);font-size:13px;font-weight:700;margin-bottom:10px;display:inline-block}
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hbar-label{width:76px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.hbar-track{flex:1;height:12px;background:var(--surface2);border-radius:6px;overflow:hidden}
.hbar-fill{height:100%;border-radius:6px;transition:width .4s ease}
.hbar-n{width:28px;text-align:right;font-family:'Anton';font-size:14px}
.form-dots{display:flex;gap:8px;justify-content:center}
.fdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;border:1.5px solid}
.fdot.g{background:rgba(200,241,53,.15);color:var(--volt);border-color:var(--volt-dim)}
.fdot.e{background:var(--surface2);color:var(--muted);border-color:var(--line)}
.fdot.p{background:rgba(240,101,101,.12);color:var(--danger);border-color:var(--danger)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
/* ============ STORAGE ============ */
const LS_KEY = 'fifa_tracker_v1';
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);

const DEFAULT_CLUBS = [
  { name: 'PSG', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/France%20-%20Ligue%201/Paris%20Saint-Germain.png' },
  { name: 'Real Madrid', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Spain%20-%20LaLiga/Real%20Madrid.png' },
  { name: 'Barcelona', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Spain%20-%20LaLiga/FC%20Barcelona.png' },
  { name: 'Manchester City', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/England%20-%20Premier%20League/Manchester%20City.png' },
  { name: 'Liverpool', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/England%20-%20Premier%20League/Liverpool%20FC.png' },
  { name: 'Bayern Múnich', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Germany%20-%20Bundesliga/Bayern%20Munich.png' },
  { name: 'Colo-Colo' },
  { name: 'U. de Chile', logo: 'https://raw.githubusercontent.com/sportlogos/football.db.logos/master/south-america/cl-chile/udechile.gif' },
  { name: 'U. Católica', logo: 'https://raw.githubusercontent.com/sportlogos/football.db.logos/master/south-america/cl-chile/cduc.png' },
  { name: 'Boca Juniors', logo: 'https://raw.githubusercontent.com/sportlogos/football.db.logos/master/south-america/ar-argentina/bocajuniors.png' },
  { name: 'River Plate', logo: 'https://raw.githubusercontent.com/sportlogos/football.db.logos/master/south-america/ar-argentina/riverplate.png' },
  { name: 'Milan', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Italy%20-%20Serie%20A/AC%20Milan.png' },
  { name: 'Inter', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Italy%20-%20Serie%20A/Inter%20Milan.png' },
  { name: 'Juventus', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Italy%20-%20Serie%20A/Juventus%20FC.png' },
  { name: 'Arsenal', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/England%20-%20Premier%20League/Arsenal%20FC.png' },
  { name: 'Chelsea', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/England%20-%20Premier%20League/Chelsea%20FC.png' },
  { name: 'Atlético Madrid', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Spain%20-%20LaLiga/Atl%C3%A9tico%20de%20Madrid.png' },
  { name: 'Borussia Dortmund', logo: 'https://raw.githubusercontent.com/luukhopman/football-logos/master/logos/Germany%20-%20Bundesliga/Borussia%20Dortmund.png' }
];

const loadDB = () => {
  let d;
  try { d = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { d = {}; }
  // Migración v1 → v2: los "teams" antiguos pasan a ser jugadores (mismos IDs,
  // así los torneos existentes siguen funcionando)
  let players = d.players || [];
  if (d.teams && d.teams.length) {
    d.teams.forEach(t => {
      if (!players.some(p => p.id === t.id)) players.push({ id: t.id, name: t.name, emoji: t.emoji || '🎮' });
    });
  }
  players = players.map(p => ({ emoji: '🎮', ...p }));
  const tournaments = (d.tournaments || []).map(t => ({
    ...t, seasonId: t.seasonId || null, config: { fixtureMode: 'sorteo', ...(t.config || {}) } }));
  // Ya no se precargan clubes: la lista arranca vacía y se completa buscando
  // en el catálogo de 207 al registrar un partido, o creando uno propio.
  let clubs = d.clubs || [];
  // Limpieza única: elimina clubes que quedaron sembrados automáticamente en
  // versiones anteriores y que nunca se llegaron a usar en ningún partido.
  const usedIds = new Set();
  tournaments.forEach(t => t.matches.forEach(m => { if (m.clubA) usedIds.add(m.clubA); if (m.clubB) usedIds.add(m.clubB); }));
  const seededNames = new Set(DEFAULT_CLUBS.map(c => c.name.toLowerCase()));
  clubs = clubs.filter(c => usedIds.has(c.id) || !seededNames.has(c.name.toLowerCase()));
  // Backfill: si un club conservado coincide con el catálogo y no tiene logo, asignárselo
  clubs = clubs.map(c => {
    if (!c.logo) {
      const known = DEFAULT_CLUBS.find(k => k.logo && k.name.toLowerCase() === c.name.toLowerCase());
      if (known) return { ...c, logo: known.logo };
    }
    return c;
  });
  const seasons = d.seasons || [];
  return { players, clubs, tournaments, seasons };
};

/* ============ RÉCORDS ============ */
function clubRecord(clubId, tournaments) {
  const r = { pj:0, g:0, e:0, p:0, gf:0, gc:0 };
  tournaments.forEach(t => t.matches.forEach(m => {
    if (!m.played || m.bye) return;
    if (m.clubA === clubId) {
      r.pj++; r.gf += m.golesA; r.gc += m.golesB;
      m.golesA > m.golesB ? r.g++ : m.golesA < m.golesB ? r.p++ : r.e++;
    }
    if (m.clubB === clubId) {
      r.pj++; r.gf += m.golesB; r.gc += m.golesA;
      m.golesB > m.golesA ? r.g++ : m.golesB < m.golesA ? r.p++ : r.e++;
    }
  }));
  return r;
}
function playerRecord(playerId, tournaments) {
  const r = { pj:0, g:0, e:0, p:0, gf:0, gc:0, titulos:0 };
  tournaments.forEach(t => {
    if (t.status === 'finalizado' && t.champion === playerId) r.titulos++;
    t.matches.forEach(m => {
      if (!m.played || m.bye) return;
      if (m.teamA === playerId) {
        r.pj++; r.gf += m.golesA; r.gc += m.golesB;
        m.golesA > m.golesB ? r.g++ : m.golesA < m.golesB ? r.p++ : r.e++;
      }
      if (m.teamB === playerId) {
        r.pj++; r.gf += m.golesB; r.gc += m.golesA;
        m.golesB > m.golesA ? r.g++ : m.golesB < m.golesA ? r.p++ : r.e++;
      }
    });
  });
  return r;
}

function matchesOfPlayer(playerId, tournaments) {
  const out = [];
  tournaments.forEach(t => t.matches.forEach(m => {
    if (m.played && !m.bye && (m.teamA === playerId || m.teamB === playerId))
      out.push({ ...m, tName: t.name });
  }));
  return out.sort((a, b) => (b.playedAt || 0) - (a.playedAt || 0));
}
function matchesOfClub(clubId, tournaments) {
  const out = [];
  tournaments.forEach(t => t.matches.forEach(m => {
    if (m.played && !m.bye && (m.clubA === clubId || m.clubB === clubId))
      out.push({ ...m, tName: t.name });
  }));
  return out.sort((a, b) => (b.playedAt || 0) - (a.playedAt || 0));
}
// Récord de un jugador filtrado por club, o cara a cara contra un rival
function recordWhere(tournaments, fn) {
  const r = { pj:0, g:0, e:0, p:0, gf:0, gc:0 };
  tournaments.forEach(t => t.matches.forEach(m => {
    if (!m.played || m.bye) return;
    const side = fn(m);
    if (!side) return;
    const my = side === 'A' ? m.golesA : m.golesB;
    const their = side === 'A' ? m.golesB : m.golesA;
    r.pj++; r.gf += my; r.gc += their;
    my > their ? r.g++ : my < their ? r.p++ : r.e++;
  }));
  return r;
}

function topScorers(players, tournaments, limit = 5) {
  return players.map(p => ({ p, r: playerRecord(p.id, tournaments) }))
    .filter(x => x.r.pj > 0)
    .sort((a, b) => b.r.gf - a.r.gf || b.r.pj - a.r.pj)
    .slice(0, limit);
}
function currentStreak(playerId, tournaments) {
  const ms = matchesOfPlayer(playerId, tournaments); // ya viene ordenado, más reciente primero
  let streak = 0, type = null;
  for (const m of ms) {
    const my = m.teamA === playerId ? m.golesA : m.golesB;
    const their = m.teamA === playerId ? m.golesB : m.golesA;
    const res = my > their ? 'g' : my < their ? 'p' : 'e';
    if (type === null) { type = res; streak = 1; }
    else if (res === type) streak++;
    else break;
  }
  return { type, streak };
}
function hottestStreak(players, tournaments) {
  const streaks = players.map(p => ({ p, s: currentStreak(p.id, tournaments) }))
    .filter(x => x.s.type === 'g' && x.s.streak >= 2)
    .sort((a, b) => b.s.streak - a.s.streak);
  return streaks[0] || null;
}

function playerAchievements(playerId, tournaments) {
  const r = playerRecord(playerId, tournaments);
  const streak = currentStreak(playerId, tournaments);
  const ms = matchesOfPlayer(playerId, tournaments);
  let maxMargin = 0;
  ms.forEach(m => {
    const my = m.teamA === playerId ? m.golesA : m.golesB;
    const their = m.teamA === playerId ? m.golesB : m.golesA;
    if (my > their) maxMargin = Math.max(maxMargin, my - their);
  });
  return ACHIEVEMENTS.filter(a => a.check(r, { streak, maxMargin }));
}

/* ============ ELO ============ */
const ELO_BASE = 1000, ELO_K = 32;
// Recalcula el ranking ELO completo repasando todos los partidos en orden cronológico.
// Puro y derivado: no se guarda en ningún lado, siempre se recalcula desde el historial real.
function computeElo(players, tournaments) {
  const ratings = {}, history = {};
  players.forEach(p => { ratings[p.id] = ELO_BASE; history[p.id] = [{ playedAt: 0, rating: ELO_BASE }]; });
  const all = [];
  tournaments.forEach(t => t.matches.forEach(m => {
    if (m.played && !m.bye && ratings[m.teamA] !== undefined && ratings[m.teamB] !== undefined) all.push(m);
  }));
  all.sort((a, b) => (a.playedAt || 0) - (b.playedAt || 0));
  all.forEach(m => {
    const Ra = ratings[m.teamA], Rb = ratings[m.teamB];
    const Ea = 1 / (1 + Math.pow(10, (Rb - Ra) / 400));
    const Sa = m.golesA > m.golesB ? 1 : m.golesA < m.golesB ? 0 : 0.5;
    ratings[m.teamA] = Math.round(Ra + ELO_K * (Sa - Ea));
    ratings[m.teamB] = Math.round(Rb + ELO_K * ((1 - Sa) - (1 - Ea)));
    history[m.teamA].push({ playedAt: m.playedAt, rating: ratings[m.teamA] });
    history[m.teamB].push({ playedAt: m.playedAt, rating: ratings[m.teamB] });
  });
  return { ratings, history };
}
function eloRanking(players, tournaments) {
  const { ratings } = computeElo(players, tournaments);
  return players.map(p => ({ p, elo: ratings[p.id] })).sort((a, b) => b.elo - a.elo);
}

/* ============ ENGINE (puro) ============ */
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// Round robin (algoritmo del círculo). Devuelve matches con round.
function roundRobin(teamIds, { idaVuelta = false, stage = 'liga', group = null } = {}) {
  const teams = [...teamIds];
  if (teams.length % 2 !== 0) teams.push(null); // bye
  const n = teams.length, roundsCount = n - 1, half = n / 2;
  let arr = [...teams];
  const matches = [];
  for (let r = 0; r < roundsCount; r++) {
    for (let i = 0; i < half; i++) {
      const a = arr[i], b = arr[n - 1 - i];
      if (a !== null && b !== null) {
        const home = r % 2 === 0 ? a : b, away = r % 2 === 0 ? b : a;
        matches.push({ id: uid(), stage, group, round: r + 1, teamA: home, teamB: away,
          golesA: null, golesB: null, played: false });
      }
    }
    arr = [arr[0], arr[n - 1], ...arr.slice(1, n - 1)];
  }
  if (idaVuelta) {
    const vuelta = matches.map(m => ({ ...m, id: uid(), round: m.round + roundsCount,
      teamA: m.teamB, teamB: m.teamA }));
    return [...matches, ...vuelta];
  }
  return matches;
}

// Tabla de posiciones. Orden: Pts, DG, GF, nombre.
function computeStandings(teamIds, matches, teamsById) {
  const t = {};
  teamIds.forEach(id => { t[id] = { id, pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 }; });
  matches.filter(m => m.played && !m.bye).forEach(m => {
    const A = t[m.teamA], B = t[m.teamB];
    if (!A || !B) return;
    A.pj++; B.pj++;
    A.gf += m.golesA; A.gc += m.golesB;
    B.gf += m.golesB; B.gc += m.golesA;
    if (m.golesA > m.golesB) { A.pg++; B.pp++; A.pts += 3; }
    else if (m.golesA < m.golesB) { B.pg++; A.pp++; B.pts += 3; }
    else { A.pe++; B.pe++; A.pts++; B.pts++; }
  });
  return Object.values(t).sort((a, b) =>
    b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf ||
    (teamsById[a.id]?.name || '').localeCompare(teamsById[b.id]?.name || ''));
}

// Nombre de ronda según cantidad de partidos en ella.
function roundName(matchesInRound) {
  if (matchesInRound === 1) return 'Final';
  if (matchesInRound === 2) return 'Semifinales';
  if (matchesInRound === 4) return 'Cuartos';
  if (matchesInRound === 8) return 'Octavos';
  return `Ronda de ${matchesInRound * 2}`;
}

// Bracket eliminatorio desde lista ordenada (ya emparejada: [0]vs[1], [2]vs[3]...)
function buildBracketFromOrdered(orderedIds) {
  let size = 1;
  while (size < orderedIds.length) size *= 2;
  const numByes = size - orderedIds.length;
  // Distribuir byes: los primeros N equipos pasan directo (nunca null vs null)
  const slots = [];
  orderedIds.forEach((id, i) => {
    slots.push(id);
    if (i < numByes) slots.push(null);
  });
  const matches = [];
  const r1Count = size / 2;
  for (let i = 0; i < r1Count; i++) {
    matches.push({ id: uid(), stage:'ko', round: 1, index: i,
      teamA: slots[i*2], teamB: slots[i*2+1],
      golesA: null, golesB: null, penA: null, penB: null, played: false, bye: false });
  }
  let count = r1Count, round = 2;
  while (count > 1) {
    count = count / 2;
    for (let i = 0; i < count; i++) {
      matches.push({ id: uid(), stage:'ko', round, index: i, teamA: null, teamB: null,
        golesA: null, golesB: null, penA: null, penB: null, played: false, bye: false });
    }
    round++;
  }
  // Auto-avanzar byes de ronda 1
  matches.filter(m => m.round === 1).forEach(m => {
    if (m.teamA && !m.teamB) { m.played = true; m.bye = true; advanceWinner(matches, m, m.teamA); }
    else if (!m.teamA && m.teamB) { m.played = true; m.bye = true; advanceWinner(matches, m, m.teamB); }
  });
  return matches;
}

const buildBracket = (teamIds) => buildBracketFromOrdered(shuffle(teamIds));

// Ganador de un partido KO (considera penales)
function koWinner(m) {
  if (!m.played) return null;
  if (m.bye) return m.teamA || m.teamB;
  if (m.golesA > m.golesB) return m.teamA;
  if (m.golesB > m.golesA) return m.teamB;
  if (m.penA != null && m.penB != null) return m.penA > m.penB ? m.teamA : m.teamB;
  return null;
}

function maxRound(matches) { return Math.max(...matches.map(m => m.round)); }

// Propaga ganador a la siguiente ronda. Devuelve true si era la final.
function advanceWinner(matches, match, winnerId) {
  const next = matches.find(m => m.stage === 'ko' && m.round === match.round + 1 &&
    m.index === Math.floor(match.index / 2));
  if (!next) return true; // era la final
  if (match.index % 2 === 0) next.teamA = winnerId; else next.teamB = winnerId;
  return false;
}

// Si se edita un partido KO ya jugado, limpiar rondas posteriores dependientes
function clearDownstream(matches, match) {
  const next = matches.find(m => m.stage === 'ko' && m.round === match.round + 1 &&
    m.index === Math.floor(match.index / 2));
  if (!next) return;
  const slot = match.index % 2 === 0 ? 'teamA' : 'teamB';
  if (next.played) clearDownstream(matches, next);
  next[slot] = null;
  next.played = false; next.golesA = null; next.golesB = null; next.penA = null; next.penB = null;
}

// Grupos: reparte equipos y genera round robin por grupo
function buildGroups(teamIds, numGroups) {
  const shuffled = shuffle(teamIds);
  const letters = 'ABCDEFGH';
  const groups = {};
  for (let g = 0; g < numGroups; g++) groups[letters[g]] = [];
  shuffled.forEach((id, i) => groups[letters[i % numGroups]].push(id));
  let matches = [];
  Object.entries(groups).forEach(([letter, ids]) => {
    matches = matches.concat(roundRobin(ids, { stage: 'grupos', group: letter }));
  });
  return { groups, matches };
}

// Clasificados de grupos → orden de cruce estándar (1A-2B, 1B-2A / mundial con 4 grupos)
function qualifiersOrdered(groups, matches, advancePerGroup, teamsById) {
  const letters = Object.keys(groups).sort();
  const tops = {};
  letters.forEach(L => {
    const st = computeStandings(groups[L], matches.filter(m => m.group === L), teamsById);
    tops[L] = st.slice(0, advancePerGroup).map(s => s.id);
  });
  const ordered = [];
  if (letters.length === 1) {
    ordered.push(...tops[letters[0]]);
  } else if (advancePerGroup === 1) {
    letters.forEach(L => ordered.push(tops[L][0]));
  } else {
    // cruces 1X vs 2Y entre pares de grupos (A-B, C-D, ...)
    for (let i = 0; i < letters.length; i += 2) {
      const X = letters[i], Y = letters[i + 1] || letters[i];
      ordered.push(tops[X][0], tops[Y][1], tops[Y][0], tops[X][1]);
    }
  }
  return ordered.filter(Boolean);
}

// Construye un torneo nuevo (fixture/llaves/grupos) a partir de config. Pura: no toca localStorage.
function buildTournament({ name, format, teamIds, idaVuelta = false, numGroups = 2, fixtureMode = 'sorteo' }) {
  const manual = format === 'liga' && fixtureMode === 'manual';
  const t = {
    id: uid(), name, format, teamIds: [...teamIds],
    status: 'activo', champion: null, createdAt: Date.now(),
    config: { idaVuelta, numGroups, advancePerGroup: 2, fixtureMode: manual ? 'manual' : 'sorteo' },
    groups: null, matches: [], koStarted: false
  };
  if (format === 'liga' && !manual) {
    t.matches = roundRobin(teamIds, { idaVuelta });
  } else if (format === 'eliminatoria') {
    t.matches = buildBracket(teamIds);
    t.koStarted = true;
  } else if (format === 'grupos') {
    const { groups, matches } = buildGroups(teamIds, numGroups);
    t.groups = groups; t.matches = matches;
  }
  return t;
}

/* ============ INSIGNIA DE CLUB (generada por nombre) ============ */
function clubHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
  return h;
}
function ClubBadge({ name, logo, flag, size = 16 }) {
  const [failed, setFailed] = useState(false);
  if (!name) return null;
  if (flag) {
    return <span style={{fontSize: size, lineHeight: 1, marginRight: 4, verticalAlign: '-2px'}}>{flag}</span>;
  }
  if (logo && !failed) {
    return <img className="clogo" src={logo} alt={name} loading="lazy"
      style={{ width: size + 4, height: size + 4 }} onError={()=>setFailed(true)} />;
  }
  const words = name.replace(/[^A-Za-zÀ-ÿ0-9 ]/g, '').split(/\s+/).filter(Boolean);
  const initials = (words.length === 1 ? words[0].slice(0, 3)
    : words.map(w => w[0]).join('').slice(0, 3)).toUpperCase();
  const hue = clubHue(name);
  return (
    <span className="cbadge" style={{ width: size, height: size, fontSize: Math.round(size * 0.42),
      background: `hsl(${hue} 55% 26%)`, borderColor: `hsl(${hue} 75% 48%)` }}>{initials}</span>
  );
}

/* ============ COMPARTIR COMO IMAGEN ============ */
function loadImg(src) {
  return new Promise((resolve) => {
    if (!src) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}
function drawBadge(ctx, x, y, r, name, logoImg, flag) {
  if (flag) {
    ctx.font = `${Math.round(r*1.6)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(flag, x, y);
    return;
  }
  if (logoImg) {
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();
    const s = r*2;
    ctx.drawImage(logoImg, x-s/2, y-s/2, s, s);
    ctx.restore();
    return;
  }
  const hue = clubHue(name || '?');
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = `hsl(${hue} 55% 26%)`; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = `hsl(${hue} 75% 48%)`; ctx.stroke();
  const words = (name||'?').replace(/[^A-Za-zÀ-ÿ0-9 ]/g,'').split(/\s+/).filter(Boolean);
  const initials = (words.length===1 ? words[0].slice(0,3) : words.map(w=>w[0]).join('').slice(0,3)).toUpperCase();
  ctx.fillStyle = '#fff'; ctx.font = `800 ${Math.round(r*0.85)}px Archivo, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(initials, x, y+1);
}
async function shareCanvas(canvas, filename, title) {
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  if (!blob) return;
  const file = new File([blob], filename, { type: 'image/png' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title }); return; } catch (e) { /* usuario canceló */ if (e.name === 'AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// Tendencia de ELO: normaliza al min/max propio del historial (no a 0) para que
// las subidas y bajadas se noten aunque el rating se mueva en un rango angosto.
function EloTrend({ history }) {
  const vals = history.slice(-16).map(h => h.rating);
  if (vals.length < 4) return null;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = Math.max(max - min, 1);
  return (
    <div className="spark" style={{marginTop:10,height:40}}>
      {vals.map((v, i) => (
        <div key={i} className="bar" title={v}
          style={{height: (10 + (v-min)/range*90)+'%', opacity: i===vals.length-1?1:0.55}} />
      ))}
    </div>
  );
}

        <div className="stat"><div className="n">{played.length}</div><div className="l">Partidos jugados</div></div>
        <div className="stat"><div className="n">{goles}</div><div className="l">Goles totales</div></div>
        <div className="stat"><div className="n">{done.length}</div><div className="l">Torneos completados</div></div>
        <div className="stat"><div className="n">{db.players.length}</div><div className="l">Jugadores</div></div>
      </div>

      {topChamp && playersById[topChamp[0]] && (
        <div className="champ-banner">
          <div className="cup">👑</div>
          <div className="eyebrow" style={{marginBottom:0}}>Máximo campeón</div>
          <div className="who">{playersById[topChamp[0]].emoji} {playersById[topChamp[0]].name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{topChamp[1]} título{topChamp[1]>1?'s':''}</div>
        </div>
      )}

      {(() => {
        const rank = eloRanking(db.players, db.tournaments).filter(x => x.elo !== ELO_BASE || playerRecord(x.p.id, db.tournaments).pj > 0);
        if (rank.length < 2) return null;
        return (
          <React.Fragment>
            <div className="section-title">🏅 Ranking ELO</div>
            <div className="card">
              {rank.slice(0,5).map((x, i) => (
                <div key={x.p.id} className="row tap" style={{padding:'6px 0',cursor:'pointer'}}
                  onClick={()=>go('#/jugador/'+x.p.id)}>
                  <span className="pos" style={{width:16}}>{i+1}</span>
                  <span style={{fontSize:18}}>{x.p.emoji}</span>
                  <span className="grow" style={{fontWeight:600,fontSize:14}}>{x.p.name}</span>
                  <span className="display" style={{fontSize:16,color:'var(--volt)'}}>{x.elo}</span>
                </div>
              ))}
            </div>
          </React.Fragment>
        );
      })()}

      {(() => {
        const scorers = topScorers(db.players, db.tournaments, 3);
        const hot = hottestStreak(db.players, db.tournaments);
        if (scorers.length === 0 && !hot) return null;
        return (
          <div className="row" style={{gap:10,marginBottom:12,alignItems:'stretch'}}>
            {scorers.length > 0 && (
              <div className="card tap grow" style={{marginBottom:0}} onClick={()=>go('#/jugador/'+scorers[0].p.id)}>
                <div className="eyebrow">⚡ Goleador</div>
                <div style={{fontWeight:700,fontSize:15}}>{scorers[0].p.emoji} {scorers[0].p.name}</div>
                <div className="display" style={{fontSize:22,color:'var(--volt)'}}>{scorers[0].r.gf} goles</div>
              </div>
            )}
            {hot && (
              <div className="card tap grow" style={{marginBottom:0}} onClick={()=>go('#/jugador/'+hot.p.id)}>
                <div className="eyebrow">🔥 Racha caliente</div>
                <div style={{fontWeight:700,fontSize:15}}>{hot.p.emoji} {hot.p.name}</div>
                <div className="display" style={{fontSize:22,color:'var(--volt)'}}>{hot.s.streak} seguidas</div>
              </div>
            )}
          </div>
        );
      })()}

      {active.length > 0 && <div className="section-title">En juego</div>}
      {active.map(t => <TournamentCard key={t.id} t={t} playersById={playersById} />)}

      <button className="btn primary" style={{marginTop:8}} onClick={()=>go('#/nuevo')}>
        + Nuevo torneo</button>

      {lastPlayed.length > 0 && (
        <React.Fragment>
          <div className="section-title">Últimos resultados</div>
          {lastPlayed.map(m => (
            <div className="mrow" key={m.id}>
              <div className="t"><PlayerTag id={m.teamA} playersById={playersById} club={clubsById[m.clubA]} /></div>
              <div className="mid">{m.golesA} - {m.golesB}</div>
              <div className="t right"><PlayerTag id={m.teamB} playersById={playersById} club={clubsById[m.clubB]} right /></div>
            </div>
          ))}
        </React.Fragment>
      )}

      {db.tournaments.length === 0 && (
        <div className="empty">
          <div className="big">🏟️</div>
          <p>El estadio está vacío.<br/>Agrega a tus amigos en Jugadores y arma la primera liga.</p>
        </div>
      )}
    </React.Fragment>
  );
}

function TournamentCard({ t, playersById }) {
  const played = t.matches.filter(m => m.played && !m.bye).length;
  const total = t.matches.filter(m => !m.bye).length;
  const manual = t.config.fixtureMode === 'manual';
  return (
    <div className="card tap" onClick={()=>go('#/torneo/'+t.id)}>
      <div className="row">
        <div className="grow">
          <div className="eyebrow">{FORMATS[t.format]}{manual?' libre':''} · {t.teamIds.length} jugadores</div>
          <div className="display" style={{fontSize:18}}>{t.name}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
            {manual ? `${played} partidos` : `${played}/${total} partidos`} · {fmtDate(t.createdAt)}</div>
        </div>
        {t.status === 'finalizado'
          ? <span className="badge done">🏆 {playersById[t.champion]?.name || 'Finalizado'}</span>
          : <span className="badge on">En juego</span>}
      </div>
    </div>
  );
}

function TournamentsList({ db, playersById }) {
  const sorted = [...db.tournaments].sort((a,b) => b.createdAt - a.createdAt);
  return (
    <React.Fragment>
      <button className="btn primary" onClick={()=>go('#/nuevo')}>+ Nuevo torneo</button>
      <button className="btn ghost" style={{marginTop:8}} onClick={()=>go('#/temporadas')}>
        📅 Temporadas {db.seasons.length > 0 && `(${db.seasons.length})`}</button>
      {sorted.length === 0
        ? <div className="empty"><div className="big">🏆</div><p>Aún no hay torneos.<br/>Crea el primero y que ruede la pelota.</p></div>
        : <React.Fragment>
            <div className="section-title">Todos los torneos</div>
            {sorted.map(t => <TournamentCard key={t.id} t={t} playersById={playersById} />)}
          </React.Fragment>}
    </React.Fragment>
  );
}

/* ============ TEMPORADAS ============ */
function SeasonsList({ db, update, notifyDelete, playersById }) {
  const [editing, setEditing] = useState(null);
  const saveSeason = (s) => {
    update(d => {
      if (s.id) { const i = d.seasons.findIndex(x => x.id === s.id); d.seasons[i] = s; }
      else d.seasons.push({ ...s, id: uid(), createdAt: Date.now() });
      return d;
    });
    setEditing(null);
  };
  const sorted = [...db.seasons].sort((a,b) => b.createdAt - a.createdAt);
  return (
    <React.Fragment>
      <button onClick={()=>go('#/torneos')} style={{color:'var(--muted)',fontSize:12,marginBottom:8}}>← Torneos</button>
      <h2 className="display" style={{fontSize:20,marginBottom:4}}>Temporadas</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>
        Agrupa varios torneos en una tabla acumulada, como una temporada de liga.</p>
      <button className="btn primary" onClick={()=>setEditing({ name:'' })}>+ Nueva temporada</button>
      {sorted.length === 0 ? (
        <div className="empty"><div className="big">📅</div><p>Sin temporadas todavía.<br/>Créala y luego suma torneos al crearlos.</p></div>
      ) : (
        <React.Fragment>
          <div className="section-title">Todas</div>
          {sorted.map(s => {
            const ts = db.tournaments.filter(t => t.seasonId === s.id);
            const teamIds = [...new Set(ts.flatMap(t => t.teamIds))];
            const leader = computeStandings(teamIds, ts.flatMap(t=>t.matches), playersById)[0];
            return (
              <div className="card tap" key={s.id} onClick={()=>go('#/temporada/'+s.id)}>
                <div className="row">
                  <div className="grow">
                    <div className="display" style={{fontSize:17}}>{s.name}</div>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{ts.length} torneo{ts.length!==1?'s':''} · {teamIds.length} jugadores</div>
                  </div>
                  {leader && playersById[leader.id] && (
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'var(--muted)'}}>Líder</div>
                      <div style={{fontWeight:700,fontSize:13}}>{playersById[leader.id].emoji} {playersById[leader.id].name}</div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </React.Fragment>
      )}
      {editing && <SeasonEditor season={editing} onSave={saveSeason} onClose={()=>setEditing(null)} />}
    </React.Fragment>
  );
}

function SeasonEditor({ season, onSave, onClose }) {
  const [name, setName] = useState(season.name);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-grab" />
        <h2 className="display">{season.id ? 'Editar temporada' : 'Nueva temporada'}</h2>
        <div className="field">
          <label>Nombre</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Temporada 2026-1" autoFocus />
        </div>
        <button className="btn primary" disabled={!name.trim()}
          onClick={()=>onSave({ ...season, name: name.trim() })}>Guardar temporada</button>
      </div>

  );
}

function SeasonDetail({ id, db, update, notifyDelete, playersById }) {
  const [editing, setEditing] = useState(false);
  const s = db.seasons.find(x => x.id === id);
  if (!s) return <div className="empty"><div className="big">🤷</div>Temporada no encontrada</div>;

  const ts = db.tournaments.filter(t => t.seasonId === id).sort((a,b) => a.createdAt - b.createdAt);
  const teamIds = [...new Set(ts.flatMap(t => t.teamIds))];
  const allMatches = ts.flatMap(t => t.matches);
  const standings = computeStandings(teamIds, allMatches, playersById);
  const scorers = topScorers(teamIds.map(id => playersById[id]).filter(Boolean), ts, 3);

  const saveSeason = (upd) => {
    update(d => { const i = d.seasons.findIndex(x => x.id === id); d.seasons[i] = upd; return d; });
    setEditing(false);
  };
  const deleteSeason = async () => {
    if (await uiConfirm('¿Eliminar esta temporada? Los torneos que contiene NO se borran, solo dejan de estar agrupados.',
      { destructive:true, okLabel:'Eliminar' })) {
      notifyDelete(`${s.name} eliminada`, d => {
        d.seasons = d.seasons.filter(x => x.id !== id);
        d.tournaments.forEach(t => { if (t.seasonId === id) t.seasonId = null; });
        return d;
      });
      go('#/temporadas');
    }
  };
  const removeFromSeason = (tid) => {
    update(d => { const t = d.tournaments.find(x => x.id === tid); if (t) t.seasonId = null; return d; });
  };

  return (
    <React.Fragment>
      <button onClick={()=>go('#/temporadas')} style={{color:'var(--muted)',fontSize:12,marginBottom:8}}>← Temporadas</button>
      <div className="row" style={{marginBottom:12}}>
        <div className="grow">
          <div className="eyebrow">{ts.length} torneo{ts.length!==1?'s':''} · {teamIds.length} jugadores</div>
          <h2 className="display" style={{fontSize:22}}>{s.name}</h2>
        </div>
        <button className="btn ghost sm" onClick={()=>setEditing(true)}>Editar</button>
      </div>

      {standings.length === 0 ? (
        <div className="empty"><div className="big">📅</div><p>Esta temporada aún no tiene torneos.<br/>Agrégala al crear un nuevo torneo.</p></div>
      ) : (
        <React.Fragment>
          <div className="section-title">Tabla acumulada</div>
          <StandingsTable teamIds={teamIds} matches={allMatches} playersById={playersById} />
          <button className="btn ghost sm" style={{marginTop:12}}
            onClick={()=>shareStandingsImage(s.name, standings, playersById)}>
            📤 Compartir tabla</button>

          {scorers.length > 0 && (
            <React.Fragment>
              <div className="section-title">Goleadores de la temporada</div>
              {scorers.map((x,i) => (
                <div className="mrow" key={x.p.id} style={{gridTemplateColumns:'auto 1fr auto'}}>
                  <span className="pos">{i+1}</span>
                  <div className="t"><span>{x.p.emoji}</span><span className="nm">{x.p.name}</span></div>
                  <div className="mid">{x.r.gf}</div>
                </div>
              ))}
            </React.Fragment>
          )}
        </React.Fragment>
      )}

      <div className="section-title">Torneos incluidos</div>
      {ts.length === 0
        ? <p style={{fontSize:12,color:'var(--muted)'}}>Ninguno todavía.</p>
        : ts.map(t => (
          <div className="mrow-tag" key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 4px'}}>
            <span className="tap grow" style={{cursor:'pointer',color:'var(--text)',fontWeight:600,fontSize:13,textTransform:'none',letterSpacing:0}}
              onClick={()=>go('#/torneo/'+t.id)}>{t.name}</span>
            <button className="btn ghost sm" onClick={()=>removeFromSeason(t.id)}>Quitar</button>
          </div>
        ))}

      <button className="btn danger" style={{marginTop:24}} onClick={deleteSeason}>Eliminar temporada</button>
      {editing && <SeasonEditor season={s} onSave={saveSeason} onClose={()=>setEditing(false)} />}
    </React.Fragment>
  );
}

/* ============ FICHA DE JUGADOR ============ */
function PlayerDetail({ id, db, update, playersById, clubsById }) {
  const [editing, setEditing] = useState(false);
  const p = playersById[id];
  if (!p) return <div className="empty"><div className="big">🤷</div>Jugador no encontrado</div>;
  const r = playerRecord(id, db.tournaments);
  const ms = matchesOfPlayer(id, db.tournaments);
  const golesPorPartido = [...ms].reverse().slice(-12)
    .map(m => m.teamA === id ? m.golesA : m.golesB);

  // Clubes que ha usado
  const clubIds = [...new Set(ms.map(m => m.teamA === id ? m.clubA : m.clubB).filter(Boolean))];
  const clubRecs = clubIds.map(cid => ({
    club: clubsById[cid],
    r: recordWhere(db.tournaments, m =>
      (m.teamA === id && m.clubA === cid) ? 'A' : (m.teamB === id && m.clubB === cid) ? 'B' : null)
  })).filter(x => x.club).sort((a,b) => b.r.pj - a.r.pj);

  // Cara a cara contra cada rival
  const rivals = db.players.filter(x => x.id !== id).map(riv => ({
    riv,
    r: recordWhere(db.tournaments, m =>
      (m.teamA === id && m.teamB === riv.id) ? 'A' : (m.teamB === id && m.teamA === riv.id) ? 'B' : null)
  })).filter(x => x.r.pj > 0).sort((a,b) => b.r.pj - a.r.pj);

  const savePlayer = (pl) => {
    update(d => { const i = d.players.findIndex(x => x.id === pl.id); d.players[i] = pl; return d; });
    setEditing(false);
  };

  return (
    <React.Fragment>
      <button onClick={()=>go('#/jugadores')} style={{color:'var(--muted)',fontSize:12,marginBottom:8}}>← Jugadores</button>
      <div className="row" style={{marginBottom:4}}>
        <div style={{fontSize:44}}>{p.emoji}</div>
        <div className="grow">
          <h2 className="display" style={{fontSize:24}}>{p.name}</h2>
          {r.titulos > 0 && <div style={{fontSize:13}}>{'🏆'.repeat(Math.min(r.titulos,8))} {r.titulos} título{r.titulos>1?'s':''}</div>}
        </div>
        <button className="btn ghost sm" onClick={()=>setEditing(true)}>Editar</button>
      </div>

      {r.pj === 0 ? (
        <div className="empty"><div className="big">📊</div><p>Sin partidos todavía.<br/>Las estadísticas aparecerán cuando juegue.</p></div>
      ) : (
        <React.Fragment>
          {(() => {
            const s = currentStreak(id, db.tournaments);
            if (s.streak < 2) return null;
            const label = s.type==='g' ? `🔥 ${s.streak} victorias seguidas` : s.type==='p' ? `${s.streak} derrotas seguidas` : `${s.streak} empates seguidos`;
            return <div className="streak-pill" style={{marginBottom:12}}>{label}</div>;
          })()}

          {(() => {
            const { ratings, history } = computeElo(db.players, db.tournaments);
            const elo = ratings[id];
            const hist = history[id];
            const delta = elo - ELO_BASE;
            const rank = eloRanking(db.players, db.tournaments);
            const pos = rank.findIndex(x => x.p.id === id) + 1;
            return (
              <div className="card">
                <div className="row">
                  <div className="grow">
                    <div className="eyebrow">🏅 Rating ELO</div>
                    <div className="display" style={{fontSize:32,color:'var(--volt)'}}>{elo}</div>
                    <div style={{fontSize:12,color: delta>=0?'var(--volt)':'var(--danger)'}}>
                      {delta>=0?'+':''}{delta} desde el inicio</div>
                  </div>
                  {pos > 0 && <div style={{textAlign:'center'}}>
                    <div className="display" style={{fontSize:22,color:'var(--muted)'}}>#{pos}</div>
                    <div style={{fontSize:9,color:'var(--muted)',letterSpacing:'.08em'}}>DEL GRUPO</div>
                  </div>}
                </div>
                {hist.length >= 4 && <EloTrend history={hist} />}
              </div>
            );
          })()}

          <div className="big-stat-row">
            <div className="big-stat"><div className="n">{r.pj}</div><div className="l">Jugados</div></div>
            <div className="big-stat"><div className="n">{Math.round(r.g/r.pj*100)}%</div><div className="l">Victorias</div></div>
            <div className="big-stat"><div className="n">{r.gf}</div><div className="l">Goles</div></div>
            <div className="big-stat"><div className="n">{r.gf-r.gc>0?'+':''}{r.gf-r.gc}</div><div className="l">Dif. gol</div></div>
          </div>

          {(() => {
            const ach = playerAchievements(id, db.tournaments);
            if (ach.length === 0) return null;
            return (
              <div className="card">
                <div className="eyebrow">Logros ({ach.length})</div>
                <div className="ach-grid">
                  {ach.map(a => (
                    <div className="ach" key={a.id} title={a.desc || a.name}>
                      <div className="ic">{a.icon}</div>
                      <div className="nm">{a.name}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          <div className="card">
            <div className="eyebrow">Resultados</div>
            <GEPBar g={r.g} e={r.e} p={r.p} />
          </div>

          {golesPorPartido.length >= 2 && (
            <div className="card">
              <div className="eyebrow">Goles por partido (últimos {golesPorPartido.length})</div>
              <Spark values={golesPorPartido} />
            </div>
          )}

          {clubRecs.length > 0 && (
            <React.Fragment>
              <div className="section-title">Sus clubes</div>
              {clubRecs.map(({club, r:cr}) => (
                <div className="card" key={club.id}>
                  <div className="row">
                    <ClubBadge name={club.name} logo={club.logo} flag={club.flag} size={26} />
                    <div className="grow">
                      <div style={{fontWeight:700,fontSize:14}}>{club.name}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{cr.pj} PJ · {cr.g}G {cr.e}E {cr.p}P · {cr.gf}:{cr.gc}</div>
                    </div>
                    <div className="display" style={{fontSize:16,color:'var(--volt)'}}>{Math.round(cr.g/cr.pj*100)}%</div>
                  </div>
                </div>
              ))}
            </React.Fragment>
          )}

          {rivals.length > 0 && (
            <React.Fragment>
              <div className="section-title">Cara a cara</div>
              {rivals.map(({riv, r:hr}) => (
                <div className="card tap" key={riv.id} onClick={()=>go('#/jugador/'+riv.id)}>
                  <div className="row">
                    <div style={{fontSize:22}}>{riv.emoji}</div>
                    <div className="grow">
                      <div style={{fontWeight:700,fontSize:14}}>vs {riv.name}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{hr.pj} PJ · goles {hr.gf}:{hr.gc}</div>
                    </div>
                    <div style={{fontSize:13,fontWeight:700}}>
                      <span style={{color:'var(--volt)'}}>{hr.g}G</span> <span style={{color:'var(--muted)'}}>{hr.e}E</span> <span style={{color:'var(--danger)'}}>{hr.p}P</span></div>
                  </div>
                </div>
              ))}
            </React.Fragment>
          )}

          <div className="section-title">Últimos partidos</div>
          {ms.slice(0,6).map(m => (
            <MatchRow key={m.id} m={m} playersById={playersById} clubsById={clubsById} onEdit={null} />
          ))}
        </React.Fragment>
      )}

      {editing && <PlayerEditor player={p} onSave={savePlayer} onClose={()=>setEditing(false)} />}
    </React.Fragment>
  );
}

/* ============ JUGADORES & CLUBES ============ */
function PlayersView({ db, update, notifyDelete }) {
  const [editing, setEditing] = useState(null);
  const fileRef = useRef(null);
  const eloById = useMemo(() => computeElo(db.players, db.tournaments).ratings, [db.players, db.tournaments]);

  const usedIn = (pid) => db.tournaments.some(t => t.teamIds.includes(pid));

  const savePlayer = (p) => {
    update(d => {
      if (p.id) { const i = d.players.findIndex(x => x.id === p.id); d.players[i] = p; }
      else d.players.push({ ...p, id: uid() });
      return d;
    });
    setEditing(null);
  };
  const removePlayer = async (id) => {
    if (usedIn(id)) { uiAlert('Este jugador participa en torneos. No se puede eliminar.'); return; }
    const name = db.players.find(p => p.id === id)?.name;
    if (await uiConfirm('¿Eliminar jugador?', { destructive:true, okLabel:'Eliminar' }))
      notifyDelete(`${name} eliminado`, d => { d.players = d.players.filter(p => p.id !== id); return d; });
  };



  const exportData = () => {
    const blob = new Blob([JSON.stringify(db, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fifa-torneos-backup.json';
    a.click();
  };
  const importData = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const data = JSON.parse(r.result);
        if (!data.players && !data.teams) throw new Error();
        if (await uiConfirm('Esto reemplaza todos los datos actuales. ¿Continuar?', { destructive:true, okLabel:'Reemplazar' })) {
          localStorage.setItem(LS_KEY, r.result);
          update(() => loadDB());
        }
      } catch { uiAlert('El archivo no es un respaldo válido.'); }
    };
    r.readAsText(f);
    e.target.value = '';
  };

  return (
    <React.Fragment>
      <button className="btn primary" onClick={()=>setEditing({ name:'', emoji:'🎮' })}>+ Nuevo jugador</button>
      <div className="section-title">Jugadores ({db.players.length})</div>

function ClubDetail({ id, db, update, notifyDelete, playersById, clubsById }) {

  if (!c) return <div className="empty"><div className="big">🤷</div>Club no encontrado</div>;
  const r = clubRecord(id, db.tournaments);
  const ms = matchesOfClub(id, db.tournaments);
  const golesPorPartido = [...ms].reverse().slice(-12)
    .map(m => m.clubA === id ? m.golesA : m.golesB);

  // Quién lo ha usado
  const userRecs = db.players.map(p => ({
    p,
    r: recordWhere(db.tournaments, m =>
      (m.teamA === p.id && m.clubA === id) ? 'A' : (m.teamB === p.id && m.clubB === id) ? 'B' : null)
  })).filter(x => x.r.pj > 0).sort((a,b) => b.r.pj - a.r.pj);

  const saveClub = (club) => {
    update(d => { const i = d.clubs.findIndex(x => x.id === club.id); d.clubs[i] = club; return d; });
