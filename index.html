/* ============ VISTA DE TORNEO ============ */
function TournamentView({ t, db, update, notifyDelete, playersById, clubsById }) {
  const isKO = t.format === 'eliminatoria';
  const isGroups = t.format === 'grupos';
  const manual = t.config.fixtureMode === 'manual';
  const [tab, setTab] = useState(isKO ? 'bracket' : 'partidos');
  const [editMatch, setEditMatch] = useState(null);
  const [adding, setAdding] = useState(false);

  const addClub = (club) => {
    const existing = db.clubs.find(c => c.name.toLowerCase() === club.name.toLowerCase());
    if (existing) return existing.id;
    const id = uid();
    update(d => { d.clubs.push({ id, name: club.name, logo: club.logo || null, flag: club.flag || null }); return d; });
    return id;
  };

  const groupsDone = isGroups && t.matches.filter(m => m.stage==='grupos').every(m => m.played);

  const saveResult = (matchId, golesA, golesB, penA, penB, clubA, clubB) => {
    update(d => {
      const tt = d.tournaments.find(x => x.id === t.id);
      const m = tt.matches.find(x => x.id === matchId);
      const wasKO = m.stage === 'ko';
      if (wasKO && m.played) clearDownstream(tt.matches, m);
      m.golesA = golesA; m.golesB = golesB;
      m.penA = penA; m.penB = penB;
      m.clubA = clubA; m.clubB = clubB;
      m.played = true; m.playedAt = Date.now();
      if (wasKO) {
        const w = koWinner(m);
        const wasFinal = advanceWinner(tt.matches, m, w);
        if (wasFinal) { tt.champion = w; tt.status = 'finalizado'; }
        else if (tt.status === 'finalizado') { tt.status = 'activo'; tt.champion = null; }
      }
      return d;
    });
    setEditMatch(null);
  };

  const addManualMatch = (playerA, playerB, golesA, golesB, clubA, clubB) => {
    update(d => {
      const tt = d.tournaments.find(x => x.id === t.id);
      const round = tt.matches.length + 1;
      tt.matches.push({ id: uid(), stage:'liga', group:null, round,
        teamA: playerA, teamB: playerB, golesA, golesB, clubA, clubB,
        played: true, playedAt: Date.now() });
      return d;
    });
    setAdding(false);
  };

  const deleteMatch = async (matchId) => {
    if (!await uiConfirm('¿Eliminar este partido?', { destructive:true, okLabel:'Eliminar' })) return;
    notifyDelete('Partido eliminado', d => {
      const tt = d.tournaments.find(x => x.id === t.id);
      tt.matches = tt.matches.filter(m => m.id !== matchId);
      return d;
    });
    setEditMatch(null);
  };

  const startKO = () => {
    update(d => {
      const tt = d.tournaments.find(x => x.id === t.id);
      const ordered = qualifiersOrdered(tt.groups, tt.matches, tt.config.advancePerGroup, playersById);
      tt.matches = tt.matches.concat(buildBracketFromOrdered(ordered));
      tt.koStarted = true;
      return d;
    });
    setTab('bracket');
  };

  const finishLeague = async () => {
    const st = computeStandings(t.teamIds, t.matches, playersById);
    if (await uiConfirm(`¿Finalizar torneo y coronar a ${playersById[st[0].id]?.name}? 🏆`, { okLabel:'Coronar' })) {
      update(d => {
        const tt = d.tournaments.find(x => x.id === t.id);
        tt.status = 'finalizado'; tt.champion = st[0].id;
        return d;
      });
    }
  };

  const removeTournament = async () => {
    if (await uiConfirm('¿Eliminar este torneo y todos sus partidos?', { destructive:true, okLabel:'Eliminar' })) {
      notifyDelete(`${t.name} eliminado`, d => { d.tournaments = d.tournaments.filter(x => x.id !== t.id); return d; });
      go('#/torneos');
    }
  };

  const duplicateTournament = () => {
    const nt = buildTournament({
      name: `${t.name} (nuevo)`, format: t.format, teamIds: t.teamIds,
      idaVuelta: t.config.idaVuelta, numGroups: t.config.numGroups, fixtureMode: t.config.fixtureMode
    });
    update(d => { d.tournaments.push(nt); return d; });
    go('#/torneo/' + nt.id);
  };

  const fixtureDone = t.format==='liga' && !manual && t.matches.length>0 && t.matches.every(m=>m.played);
  const manualReady = manual && t.matches.filter(m=>m.played).length >= 1;
  const tabs = [];
  if (!isKO) tabs.push(['partidos','Partidos']);
  if (t.format==='liga' || isGroups) tabs.push(['tabla', isGroups?'Grupos':'Tabla']);
  if (isKO || (isGroups && t.koStarted)) tabs.push(['bracket','Llaves']);

  return (
    <React.Fragment>
      <div className="eyebrow">{FORMATS[t.format]}{manual?' libre':''} · {t.teamIds.length} jugadores · {fmtDate(t.createdAt)}</div>
      <h2 className="display" style={{fontSize:22,marginBottom:12}}>{t.name}</h2>

      {t.status === 'finalizado' && t.champion && (
        <div className="champ-banner">
          <div className="cup">🏆</div>
          <div className="eyebrow" style={{marginBottom:0}}>Campeón</div>
          <div className="who">{playersById[t.champion]?.emoji} {playersById[t.champion]?.name}</div>
        </div>
      )}

      {tabs.length > 1 && (
        <div className="chips" style={{marginBottom:14}}>
          {tabs.map(([k, label]) => (
            <button key={k} className={'chip'+(tab===k?' on':'')} onClick={()=>setTab(k)}>{label}</button>
          ))}
        </div>
      )}

      {tab==='partidos' && manual && t.status==='activo' && (
        <button className="btn primary" style={{marginBottom:14}} onClick={()=>setAdding(true)}>
          + Registrar partido</button>
      )}
      {tab==='partidos' && <MatchList t={t} playersById={playersById} clubsById={clubsById}
        manual={manual} onEdit={setEditMatch} />}
      {tab==='tabla' && !isGroups && (
        <React.Fragment>
          <StandingsTable teamIds={t.teamIds} matches={t.matches}
            playersById={playersById} />
          <button className="btn ghost sm" style={{marginTop:12}}
            onClick={()=>shareStandingsImage(t.name, computeStandings(t.teamIds, t.matches, playersById), playersById)}>
            📤 Compartir tabla</button>
        </React.Fragment>
      )}
      {tab==='tabla' && isGroups && <GroupTables t={t} playersById={playersById} />}
      {tab==='bracket' && <Bracket matches={t.matches.filter(m=>m.stage==='ko')}
        playersById={playersById} clubsById={clubsById} onEdit={setEditMatch} />}

      {isGroups && !t.koStarted && (
        <button className="btn primary" style={{marginTop:10}} disabled={!groupsDone} onClick={startKO}>
          {groupsDone ? '⚔️ Iniciar fase eliminatoria' : 'Completa la fase de grupos para continuar'}</button>
      )}
      {(fixtureDone || manualReady) && t.status==='activo' && (
        <button className={'btn '+(fixtureDone?'primary':'ghost')} style={{marginTop:10}} onClick={finishLeague}>
          🏆 Finalizar y coronar al líder</button>
      )}

      <div className="field" style={{marginTop:24}}>
        <label>Temporada</label>
        <select value={t.seasonId || ''} onChange={e=>{
          const val = e.target.value || null;
          update(d => { const tt = d.tournaments.find(x=>x.id===t.id); tt.seasonId = val; return d; });
        }}>
          <option value="">— Torneo suelto —</option>
          {db.seasons.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        {db.seasons.length === 0 && <p style={{fontSize:11,color:'var(--muted)',marginTop:6}}>
          Crea una temporada desde Torneos → 📅 Temporadas para agrupar varios torneos en una tabla acumulada.</p>}
      </div>

      <div className="row">
        <button className="btn ghost sm" style={{flex:1}} onClick={duplicateTournament}>🎲 Duplicar torneo</button>
        <button className="btn danger sm" style={{flex:1}} onClick={removeTournament}>Eliminar torneo</button>
      </div>

      {editMatch && <ScoreEditor match={editMatch} playersById={playersById} clubsById={clubsById} clubs={db.clubs} onAddClub={addClub}
        onSave={saveResult} onDelete={manual ? deleteMatch : null} onClose={()=>setEditMatch(null)} />}
      {adding && <AddMatchSheet t={t} playersById={playersById} clubs={db.clubs} onAddClub={addClub}
        onSave={addManualMatch} onClose={()=>setAdding(false)} />}
    </React.Fragment>
  );
}

function MatchList({ t, playersById, clubsById, manual, onEdit }) {
  const [q, setQ] = useState('');
  const all = t.matches.filter(m => m.stage !== 'ko');
  const query = q.trim().toLowerCase();
  const matches = query ? all.filter(m => {
    const names = [playersById[m.teamA]?.name, playersById[m.teamB]?.name,
      clubsById[m.clubA]?.name, clubsById[m.clubB]?.name].filter(Boolean).join(' ').toLowerCase();
    return names.includes(query);
  }) : all;

  if (all.length === 0) return (
    <div className="empty"><div className="big">📋</div>
      <p>{manual ? 'Aún no hay partidos registrados.\nToca "Registrar partido" cuando jueguen.' : 'Sin partidos.'}</p></div>
  );

  const SearchBox = all.length > 4 && (
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar jugador o club..."
      style={{width:'100%',marginBottom:12,padding:'11px 14px',background:'var(--surface2)',
      border:'1px solid var(--line)',borderRadius:12,color:'var(--text)',outline:'none',fontSize:14}} />
  );

  if (matches.length === 0) return (
    <React.Fragment>
      {SearchBox}
      <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',padding:'20px 0'}}>
        Sin resultados para "{q}".</p>
    </React.Fragment>
  );

  if (manual) {
    const sorted = [...matches].sort((a,b)=>(b.playedAt||0)-(a.playedAt||0));
    return (
      <React.Fragment>
        {SearchBox}
        {sorted.map(m => <MatchRow key={m.id} m={m} playersById={playersById} clubsById={clubsById} onEdit={onEdit} />)}
      </React.Fragment>
    );
  }
  const byRound = {};
  matches.forEach(m => {
    const key = m.group ? `Grupo ${m.group} · Fecha ${m.round}` : `Fecha ${m.round}`;
    (byRound[key] = byRound[key] || []).push(m);
  });
  const keys = Object.keys(byRound).sort((a,b)=>{
    const num = s => parseInt(s.match(/Fecha (\d+)/)[1]);
    const grp = s => (s.match(/Grupo (\w)/)||[,''])[1];
    return num(a)-num(b) || grp(a).localeCompare(grp(b));
  });
  return (
    <React.Fragment>
      {SearchBox}
      {keys.map(k => (
        <React.Fragment key={k}>
          <div className="mrow-tag">{k}</div>
          {byRound[k].map(m => <MatchRow key={m.id} m={m} playersById={playersById} clubsById={clubsById} onEdit={onEdit} />)}
        </React.Fragment>
      ))}
    </React.Fragment>
  );
}

function MatchRow({ m, playersById, clubsById, onEdit }) {
  return (
    <div className="mrow" onClick={()=>onEdit && onEdit(m)} style={onEdit?{cursor:'pointer'}:{}}>
      <div className="t"><PlayerTag id={m.teamA} playersById={playersById} club={clubsById[m.clubA]} /></div>
      <div className={'mid'+(m.played?'':' pend')}>
        {m.played ? `${m.golesA} - ${m.golesB}` : 'VS'}</div>
      <div className="t right"><PlayerTag id={m.teamB} playersById={playersById} club={clubsById[m.clubB]} right /></div>
    </div>
  );
}

function StandingsTable({ teamIds, matches, playersById, qualify = 0 }) {
  const st = computeStandings(teamIds, matches, playersById);
  return (
    <table className="table">
      <thead><tr>
        <th style={{textAlign:'left'}}>Jugador</th>
        <th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>Pts</th>
      </tr></thead>
      <tbody>
        {st.map((s, i) => (
          <tr key={s.id} className={qualify && i < qualify ? 'q' : ''}>
            <td className="tname"><span className="pos">{i+1}</span> {playersById[s.id]?.emoji} {playersById[s.id]?.name}</td>
            <td>{s.pj}</td><td>{s.pg}</td><td>{s.pe}</td><td>{s.pp}</td>
            <td>{s.gf - s.gc > 0 ? '+' : ''}{s.gf - s.gc}</td>
            <td className="pts">{s.pts}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function GroupTables({ t, playersById }) {
  return (
    <React.Fragment>
      {Object.keys(t.groups).sort().map(L => (
        <div className="card" key={L}>
          <div className="eyebrow">Grupo {L}</div>
          <StandingsTable teamIds={t.groups[L]} matches={t.matches.filter(m=>m.group===L)}
            playersById={playersById} qualify={t.config.advancePerGroup} />
        </div>
      ))}
      <p style={{fontSize:11,color:'var(--muted)',textAlign:'center'}}>
        La línea verde marca los puestos de clasificación.</p>
    </React.Fragment>
  );
}

function Bracket({ matches, playersById, clubsById, onEdit }) {
  if (matches.length === 0) return null;
  const rounds = {};
  matches.forEach(m => (rounds[m.round] = rounds[m.round] || []).push(m));
  const roundNums = Object.keys(rounds).map(Number).sort((a,b)=>a-b);
  return (
    <div className="bracket">
      {roundNums.map(r => {
        const rms = rounds[r].sort((a,b)=>a.index-b.index);
        return (
          <div className="b-round" key={r}>
            <div className="b-round-title">{roundName(rms.length)}</div>
            {rms.map(m => {
              const w = koWinner(m);
              const clickable = m.teamA && m.teamB && !m.bye;
              return (
                <div className="b-match" key={m.id}
                  onClick={()=> clickable && onEdit(m)}
                  style={clickable?{cursor:'pointer'}:{opacity: m.bye?0.65:1}}>
                  <BSlot id={m.teamA} m={m} g={m.golesA} club={clubsById[m.clubA]}
                    win={w===m.teamA && m.teamA} playersById={playersById} />
                  <BSlot id={m.teamB} m={m} g={m.golesB} club={clubsById[m.clubB]}
                    win={w===m.teamB && m.teamB} playersById={playersById} />
                  {m.played && m.penA != null &&
                    <div className="b-pens">Penales {m.penA} - {m.penB}</div>}
                  {m.bye && <div className="b-pens" style={{color:'var(--muted)'}}>Pasa directo</div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function BSlot({ id, m, g, club, win, playersById }) {
  const p = id ? playersById[id] : null;
  return (
    <div className={'b-slot'+(win?' win':'')+(p?'':' tbd')}>
      {p ? <React.Fragment><span>{p.emoji}</span><span>{p.name}{club && <span className="pname"> · <ClubBadge name={club.name} logo={club.logo} flag={club.flag} size={13} /> {club.name}</span>}</span></React.Fragment> : 'Por definir'}
      {m.played && !m.bye && <span className="g">{g}</span>}
    </div>
  );
}

/* ============ SELECTOR DE CLUB ============ */
function ClubField({ value, onChange, clubs, onAddClub }) {
  const [open, setOpen] = useState(false);
  const current = clubs.find(c => c.id === value);
  return (
    <React.Fragment>
      <button className={'club-btn'+(current?' set':'')} onClick={()=>setOpen(true)}>
        {current ? <React.Fragment><ClubBadge name={current.name} logo={current.logo} flag={current.flag} size={18} /> {current.name}</React.Fragment> : '¿Con qué club?'}</button>
      {open && <ClubSheet clubs={clubs} value={value} onAddClub={onAddClub}
        onPick={id=>{ onChange(id); setOpen(false); }} onClose={()=>setOpen(false)} />}
    </React.Fragment>
  );
}

function ClubSheet({ clubs, value, onPick, onAddClub, onClose }) {
  const [q, setQ] = useState('');
  const query = q.trim().toLowerCase();
  const mine = query ? clubs.filter(c=>c.name.toLowerCase().includes(query)) : clubs;
  const myNames = new Set(clubs.map(c => c.name.toLowerCase()));
  const fromCatalog = query
    ? CLUB_CATALOG.filter(c => c.name.toLowerCase().includes(query) && !myNames.has(c.name.toLowerCase())).slice(0, 15)
    : [];
  const exact = myNames.has(query) || CLUB_CATALOG.some(c => c.name.toLowerCase() === query);
  return (
    <div className="overlay" style={{zIndex:60}} onClick={e=>{e.stopPropagation(); onClose();}}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-grab" />
        <h2 className="display" style={{fontSize:17}}>Elegir club</h2>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar club o selección..."
          style={{width:'100%',marginBottom:10,padding:'12px 14px',background:'var(--surface2)',
          border:'1px solid var(--line)',borderRadius:12,color:'var(--text)',outline:'none'}} />
        <div className="club-list">
          <button className={'club-item'+(!value?' on':'')} onClick={()=>onPick(null)}>
            Sin club{!value && <span className="chk">✓</span>}</button>
          {mine.map(c => (
            <button key={c.id} className={'club-item'+(value===c.id?' on':'')} onClick={()=>onPick(c.id)}>
              <ClubBadge name={c.name} logo={c.logo} flag={c.flag} size={22} /> {c.name}{value===c.id && <span className="chk">✓</span>}</button>
          ))}
          {fromCatalog.length > 0 && <div className="mrow-tag" style={{padding:'6px 10px 2px'}}>Del catálogo ({CLUB_CATALOG.length} disponibles)</div>}
          {fromCatalog.map((c, i) => (
            <button key={'cat'+i} className="club-item" onClick={()=>{ const id = onAddClub(c); onPick(id); }}>
              <ClubBadge name={c.name} logo={c.logo} flag={c.flag} size={22} /> {c.name}
              <span className="chk" style={{color:'var(--muted)',fontSize:11}}>agregar</span></button>
          ))}
          {query && !exact && (
            <button className="club-item" style={{color:'var(--volt)'}}
              onClick={()=>{ const id = onAddClub({ name: q.trim() }); onPick(id); }}>
              ＋ Crear "{q.trim()}"</button>
          )}
        </div>
        {!query && <p style={{fontSize:11,color:'var(--muted)',textAlign:'center'}}>
          Escribe para buscar entre {CLUB_CATALOG.length} clubes y selecciones con escudo.</p>}
      </div>
    </div>
  );
}

/* ============ EDITOR DE MARCADOR ============ */
function ScoreEditor({ match, playersById, clubsById, clubs, onAddClub, onSave, onDelete, onClose }) {
  const [gA, setGA] = useState(match.golesA ?? 0);
  const [gB, setGB] = useState(match.golesB ?? 0);
  const [pA, setPA] = useState(match.penA ?? 0);
  const [pB, setPB] = useState(match.penB ?? 0);
  const [cA, setCA] = useState(match.clubA || null);
  const [cB, setCB] = useState(match.clubB || null);
  const isKO = match.stage === 'ko';
  const needsPens = isKO && gA === gB;
  const pensValid = !needsPens || pA !== pB;
  const A = playersById[match.teamA], B = playersById[match.teamB];

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-grab" />
        <div className="sb-meta">{isKO ? 'Partido eliminatorio' : match.group ? `Grupo ${match.group} · Fecha ${match.round}` : `Fecha ${match.round}`}</div>
        <div className="scoreboard">
          <div className="sb-teams">
            <div className="sb-team">
              <div className="shield">{A?.emoji}</div>
              <div className="name">{A?.name}</div>
              <ClubField value={cA} onChange={setCA} clubs={clubs} onAddClub={onAddClub} />
              <div className="stepper" style={{marginTop:10}}>
                <div className="val">{gA}</div>
                <div className="ctrl">
                  <button onClick={()=>setGA(Math.max(0,gA-1))}>−</button>
                  <button onClick={()=>setGA(gA+1)}>+</button>
                </div>
              </div>
            </div>
            <div className="sb-vs">VS</div>
            <div className="sb-team">
              <div className="shield">{B?.emoji}</div>
              <div className="name">{B?.name}</div>
              <ClubField value={cB} onChange={setCB} clubs={clubs} onAddClub={onAddClub} />
              <div className="stepper" style={{marginTop:10}}>
                <div className="val">{gB}</div>
                <div className="ctrl">
                  <button onClick={()=>setGB(Math.max(0,gB-1))}>−</button>
                  <button onClick={()=>setGB(gB+1)}>+</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        {needsPens && (
          <div className="card" style={{marginTop:12,borderColor:'var(--gold)'}}>
            <div className="eyebrow" style={{color:'var(--gold)'}}>⚡ Empate — definición a penales</div>
            <div className="sb-teams">
              <div className="stepper">
                <div className="val" style={{fontSize:36,color:'var(--gold)'}}>{pA}</div>
                <div className="ctrl">
                  <button onClick={()=>setPA(Math.max(0,pA-1))}>−</button>
                  <button onClick={()=>setPA(pA+1)}>+</button>
                </div>
              </div>
              <div className="sb-vs" style={{fontSize:14}}>PEN</div>
              <div className="stepper">
                <div className="val" style={{fontSize:36,color:'var(--gold)'}}>{pB}</div>
                <div className="ctrl">
                  <button onClick={()=>setPB(Math.max(0,pB-1))}>−</button>
                  <button onClick={()=>setPB(pB+1)}>+</button>
                </div>
              </div>
            </div>
            {!pensValid && <p style={{fontSize:12,color:'var(--danger)',textAlign:'center',marginTop:8}}>
              Los penales no pueden terminar empatados.</p>}
          </div>
        )}

        <button className="btn primary" style={{marginTop:14}} disabled={!pensValid}
          onClick={()=>onSave(match.id, gA, gB, needsPens?pA:null, needsPens?pB:null, cA, cB)}>
          ✅ Guardar resultado</button>
        {match.played && (
          <button className="btn ghost" style={{marginTop:10}}
            onClick={()=>shareMatchImage({ ...match, golesA:gA, golesB:gB, penA: needsPens?pA:match.penA, penB: needsPens?pB:match.penB, clubA:cA, clubB:cB }, playersById, clubsById)}>
            📤 Compartir resultado</button>
        )}
        {onDelete && match.played && (
          <button className="btn danger" style={{marginTop:10}} onClick={()=>onDelete(match.id)}>
            Eliminar partido</button>
        )}
        {match.played && isKO && <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:10}}>
          Editar un resultado ya jugado recalcula las llaves siguientes.</p>}
      </div>
    </div>
  );
}

/* ============ REGISTRAR PARTIDO (liga libre) ============ */
function AddMatchSheet({ t, playersById, clubs, onAddClub, onSave, onClose }) {
  const [pA, setPA] = useState(null);
  const [pB, setPB] = useState(null);
  const [gA, setGA] = useState(0);
  const [gB, setGB] = useState(0);
  const [cA, setCA] = useState(null);
  const [cB, setCB] = useState(null);
  const valid = pA && pB && pA !== pB;
  const A = pA ? playersById[pA] : null;
  const B = pB ? playersById[pB] : null;

  const PlayerPick = ({ value, onChange, exclude }) => (
    <div className="chips" style={{justifyContent:'center'}}>
      {t.teamIds.filter(id => id !== exclude).map(id => (
        <button key={id} className={'chip'+(value===id?' on':'')} onClick={()=>onChange(id)}>
          {playersById[id]?.emoji} {playersById[id]?.name}</button>
      ))}
    </div>
  );

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-grab" />
        <h2 className="display">Registrar partido</h2>
        {(!pA || !pB) ? (
          <React.Fragment>
            <div className="field">
              <label>¿Quién juega de local?</label>
              <PlayerPick value={pA} onChange={setPA} exclude={pB} />
            </div>
            <div className="field">
              <label>¿Contra quién?</label>
              <PlayerPick value={pB} onChange={setPB} exclude={pA} />
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="sb-meta">
              <button onClick={()=>{setPA(null);setPB(null);}} style={{color:'var(--volt)',fontSize:11}}>
                ← cambiar jugadores</button>
            </div>
            <div className="scoreboard">
              <div className="sb-teams">
                <div className="sb-team">
                  <div className="shield">{A?.emoji}</div>
                  <div className="name">{A?.name}</div>
                  <ClubField value={cA} onChange={setCA} clubs={clubs} onAddClub={onAddClub} />
                  <div className="stepper" style={{marginTop:10}}>
                    <div className="val">{gA}</div>
                    <div className="ctrl">
                      <button onClick={()=>setGA(Math.max(0,gA-1))}>−</button>
                      <button onClick={()=>setGA(gA+1)}>+</button>
                    </div>
                  </div>
                </div>
                <div className="sb-vs">VS</div>
                <div className="sb-team">
                  <div className="shield">{B?.emoji}</div>
                  <div className="name">{B?.name}</div>
                  <ClubField value={cB} onChange={setCB} clubs={clubs} onAddClub={onAddClub} />
                  <div className="stepper" style={{marginTop:10}}>
                    <div className="val">{gB}</div>
                    <div className="ctrl">
                      <button onClick={()=>setGB(Math.max(0,gB-1))}>−</button>
                      <button onClick={()=>setGB(gB+1)}>+</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </React.Fragment>
        )}
        <button className="btn primary" style={{marginTop:14}} disabled={!valid}
          onClick={()=>onSave(pA, pB, gA, gB, cA, cB)}>✅ Guardar partido</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
